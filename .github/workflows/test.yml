name: CI

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    - name: Install lint tools
      run: pip install flake8
    - name: Lint
      run: flake8 trace_debugger/ tests/ --max-line-length=200 --count

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        pip install -e . pytest
    - name: Test
      run: python -m pytest tests/ -v --tb=short
    - name: Publish failure snapshot (fixture)
      run: python examples/publish_failure_snapshot.py --dir examples/failure_bundle --stem ci_failure_smoke --out-dir /tmp/tdebug_docs
